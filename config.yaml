project:
  name: "Folge Vision Publishing"
  version: "2026.7.22"
  description: "Automated documentation publishing with vision enrichment"

provider: "ollama"

ollama:
  base_url: "http://localhost:11434/v1"
  model: "qwen2.5vl-8k:latest"
  timeout: 300
  max_workers: 2
  retries: 3
  retry_delay: 5
  image_max_width: 1024
  warmup: true

lmstudio:
  base_url: "http://localhost:1234/v1"
  model: null
  timeout: 120
  max_workers: 2
  retries: 2
  retry_delay: 3
  image_max_width: 1024

llamacpp:
  base_url: "http://localhost:8080/v1"
  model: null
  timeout: 120
  max_workers: 1
  retries: 2
  retry_delay: 3
  image_max_width: 1024

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  model: "qwen/qwen-2.5-vl-72b-instruct"
  timeout: 60
  max_workers: 4
  retries: 2
  retry_delay: 2
  image_max_width: 1024

openai:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  timeout: 60
  max_workers: 4
  retries: 2
  retry_delay: 2
  image_max_width: 1024

gemini:
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
  model: "gemini-2.5-flash"
  timeout: 60
  max_workers: 4
  retries: 2
  retry_delay: 2
  image_max_width: 1024

claude:
  base_url: "https://api.anthropic.com/v1"
  model: "claude-sonnet-4-20250514"
  timeout: 90
  max_workers: 3
  retries: 2
  retry_delay: 3
  image_max_width: 1024

paths:
  input_dir: "./input"
  output_dir: "./output"
  images_dir: "./images"
  templates_dir: "./templates"
  scripts_dir: "./scripts"

targets:
  - name: "pdf"
    enabled: true
    include_long_descriptions: true
    lua_filter: "pdf-accessibility.lua"
    output_extension: ".pdf"

  - name: "docx"
    enabled: true
    include_long_descriptions: true
    lua_filter: "docx-accessibility.lua"
    output_extension: ".docx"

  - name: "html"
    enabled: true
    include_long_descriptions: true
    include_ocr: true
    include_ui_controls: true
    lua_filter: "accessibility.lua"
    output_extension: ".html"

  - name: "pptx"
    enabled: true
    include_long_descriptions: true
    lua_filter: "docx-accessibility.lua"
    output_extension: ".pptx"

  - name: "github"
    enabled: true
    include_long_descriptions: false
    lua_filter: null
    output_extension: ".md"

validation:
  min_confidence: 0.8
  require_alt_text: true
  require_long_description: true
  max_alt_text_length: 150

qa:
  flag_low_confidence: true
  low_confidence_threshold: 0.7
  flag_missing_ui_elements: true
  required_ui_types: ["button", "text_field", "dropdown"]
